name: Publish Polyester to NPM

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: "${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}"
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: "${{ github.ref_name }}"
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Java for CLJS build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Verify release push token
        env:
          PUBLISH_PUSH_TOKEN: ${{ secrets.PUBLISH_PUSH_TOKEN }}
        run: |
          if [ -z "${PUBLISH_PUSH_TOKEN}" ]; then
            echo "PUBLISH_PUSH_TOKEN is not configured."
            exit 1
          fi

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure git push auth
        env:
          PUBLISH_PUSH_TOKEN: ${{ secrets.PUBLISH_PUSH_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${PUBLISH_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Install dependencies
        run: npm ci

      - name: Verify NPM auth
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_KEY is not configured for this workflow environment."
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}

      - name: Determine release version
        id: release
        run: node scripts/ci/determine-release-version.mjs

      - name: Build
        run: npm run build

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Run CLJS smoke test
        run: npm run test:cljs

      - name: Check if version already exists on NPM
        id: existing
        run: |
          if npm view "${{ steps.release.outputs.package_name }}@${{ steps.release.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.release.outputs.version }} is already published."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.release.outputs.version }} is not published yet."
          fi

      - name: Ensure release tag exists
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: bash scripts/ci/create-release-tag.sh --tag "${TAG}" --commit HEAD --push

      - name: Publish to NPM
        if: steps.existing.outputs.exists != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}

      - name: Create or update GitHub release
        if: ${{ steps.existing.outputs.exists == 'true' || success() }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          bash scripts/ci/upsert-github-release.sh \
            --tag "${TAG}" \
            --commit "${GITHUB_SHA}" \
            --package-name "${{ steps.release.outputs.package_name }}" \
            --package-version "${VERSION}"
